packages:
  - "packages/*"

# Force a SINGLE @codemirror/state. @uiw/react-codemirror resolves 6.6.0 while
# @codemirror/lang-sql resolves 6.7.0; two copies break CodeMirror's instanceof
# checks ("Unrecognized extension value in extension set"), crashing the ltool
# Malloy editor the moment it's expanded. All @codemirror/* must share one
# @codemirror/state, so pin it.
overrides:
  "@codemirror/state": "6.7.0"

# Linker layout. Lives here (not .npmrc) so the npm CLI doesn't warn about an
# "Unknown project config" it doesn't recognize.
nodeLinker: hoisted

# pnpm 11 decides which dependencies may run install/build scripts from this
# boolean map (it rewrites the block on install). An UNdecided entry — or the
# "set this to true or false" placeholder pnpm scaffolds for a new one — makes
# `pnpm install --frozen-lockfile` fail with ERR_PNPM_IGNORED_BUILDS. So every
# package that has an install script must have an explicit true/false here.
# (onlyBuiltDependencies / ignoredBuiltDependencies are NOT consulted in v11.)
allowBuilds:
  "@duckdb/node-bindings": true
  "@swc/core": true
  cbor-extract: true
  esbuild: true
  "@nestjs/core": false
  lz4: false
  sharp: false
  unrs-resolver: false

# Supply-chain guard: pnpm 11 refuses any dependency published within the last
# 24h (its built-in `minimum-release-age` default = 24*60 min). We exempt ONLY
# the @malloydata scope — the packages we deliberately pull the moment they
# ship. pnpm matches the name part of each entry as a glob, and a bare name
# (no @version) means "any version", so this one line covers every @malloydata
# package, direct or transitive, at whatever version the lockfile resolves.
#
# Crucially this is the WHOLE list: every OTHER package still has to age 24h,
# so a malloydata bump can't silently drag fresh, unvetted transitive deps
# (aws-sdk, azure, codemirror, …) into the lockfile. Version pinning is the
# lockfile's job, not this list's. `npm run malloy-update` relies on this.
minimumReleaseAgeExclude:
  - '@malloydata/*'
